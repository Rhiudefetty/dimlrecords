<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
  <title>Apply to DIML</title>
  <style>
    body {
      background-color: black;
      color: white;
      text-align: center;
      font-family: Arial;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      color: purple;
    }
    input, textarea {
      width: 250px;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: purple;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 25px;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <h1>Apply to DIML Records</h1>

  <input type="text" placeholder="Artist Name">
  <input type="text" placeholder="Song Name (if any)">
  <textarea placeholder="Why do you want to join DIML?" rows="5"></textarea>
  <button>Submit</button>

</body>
</html>
